<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="globalErrorLog"
        style="background: #ffcccc; color: #cc0000; padding: 10px; display: none; margin-bottom: 20px; border: 1px solid #cc0000;">
    </div>
    <script>
        window.onerror = function (msg, url, line, col, error) {
            var log = document.getElementById('globalErrorLog');
            log.style.display = 'block';
            log.innerHTML += 'Error: ' + msg + '<br>Line: ' + line + '<br>' + (error ? error.stack : '') + '<br><br>';
            return false;
        };
        console.error = (function (old) {
            return function () {
                var log = document.getElementById('globalErrorLog');
                log.style.display = 'block';
                log.innerHTML += 'Console Error: ' + Array.from(arguments).join(' ') + '<br><br>';
                old.apply(console, arguments);
            }
        })(console.error);
    </script>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🧠 Smart Expense Tracker</h1>
                <p>Login to manage your finances</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="btn-primary">Login</button>

                <div class="auth-link">
                    <p>Don't have an account? <a href="register.html">Register here</a></p>
                </div>
            </form>

            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
