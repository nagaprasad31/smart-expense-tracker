<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses - Smart Expense Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand">
            <h2>🧠 Smart Expense Tracker</h2>
        </div>
        <div class="nav-menu">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="expenses.html" class="nav-link active">Expenses</a>
            <button id="logoutBtn" class="btn-secondary">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>Expense Management</h2>
            <button id="addNewExpenseBtn" class="btn-primary">+ Add New Expense</button>
        </div>

        <!-- New Visualizations Section -->
        <!-- Daily Spending Chart Section -->
        <div class="chart-section"
            style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px;">
            <h3 style="margin-bottom: 20px; color: #333;">Daily Spending</h3>
            <div style="height: 350px; position: relative;">
                <canvas id="dailyExpensesChart"></canvas>
            </div>
        </div>

        <div class="filters-section">
            <div class="filter-group">
                <label for="categoryFilter">Filter by Category:</label>
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="Food & Dining">Food & Dining</option>
                    <option value="Transportation">Transportation</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Bills & Utilities">Bills & Utilities</option>
                    <option value="Healthcare">Healthcare</option>
                    <option value="Others">Others</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="monthFilter">Filter by Month:</label>
                <input type="month" id="monthFilter">
            </div>
        </div>

        <div class="expenses-section">
            <div class="expenses-header">
                <h3>All Expenses</h3>
                <div class="expense-stats">
                    <span id="expenseCount">0 expenses</span>
                    <span id="expenseTotal">Total: ₹0.00</span>
                </div>
            </div>

            <div id="expensesList" class="expenses-list">
                <div class="loading">Loading expenses...</div>
            </div>
        </div>
    </div>

    <div id="expenseModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Expense</h3>
                <span class="close" id="closeModal">&times;</span>
            </div>
            <form id="expenseForm">
                <input type="hidden" id="expenseId">
                <div class="input-group">
                    <label for="expenseAmount">Amount (₹)</label>
                    <input type="number" id="expenseAmount" step="0.01" required>
                </div>
                <div class="input-group">
                    <label for="expenseCategory">Category</label>
                    <select id="expenseCategory" required>
                        <option value="">Select Category</option>
                        <option value="1">Food & Dining</option>
                        <option value="2">Transportation</option>
                        <option value="3">Shopping</option>
                        <option value="4">Entertainment</option>
                        <option value="5">Bills & Utilities</option>
                        <option value="6">Healthcare</option>
                        <option value="7">Others</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="expenseDescription">Description</label>
                    <input type="text" id="expenseDescription" placeholder="Optional description">
                </div>
                <div class="input-group">
                    <label for="expenseDate">Date</label>
                    <input type="date" id="expenseDate" required>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-primary" id="saveExpenseBtn">Save Expense</button>
                    <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/expenses.js"></script>
</body>

</html>
